<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicalFlow · Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="logo"><i class="fas fa-heartbeat"></i> Clinical<span>Flow</span></div>
      <p class="sub">Smart Clinical Rotation Management</p>
      <h2>Welcome Back</h2>
      <p style="color:#94a3b8; font-size:14px; margin-bottom:20px;">Sign in to your account</p>
      <div style="text-align:left; margin-bottom:16px;">
        <label style="font-weight:500; font-size:14px; color:#334155;">Email</label>
        <input type="email" id="emailInput" placeholder="your@email.com" style="margin-top:4px;" />
        <label style="font-weight:500; font-size:14px; color:#334155; display:block; margin-top:12px;">Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" style="margin-top:4px;" />
      </div>
      <div class="role-grid">
        <button class="role-btn" data-role="student" data-email="student@demo.com" data-pass="password123"><i class="fas fa-user-graduate"></i> Student</button>
        <button class="role-btn" data-role="scheduler" data-email="scheduler@demo.com" data-pass="password123"><i class="fas fa-calendar-alt"></i> Scheduler</button>
        <button class="role-btn" data-role="ci" data-email="ci@demo.com" data-pass="password123"><i class="fas fa-user-md"></i> CI</button>
        <button class="role-btn" data-role="admin" data-email="admin@demo.com" data-pass="password123"><i class="fas fa-user-tie"></i> Admin</button>
      </div>
      <div id="loginError" class="login-error" style="display:none;"></div>
      <button id="loginBtn" class="login-action-btn">Sign In <i class="fas fa-arrow-right"></i></button>
      <p style="margin-top:16px; font-size:13px; color:#64748b;">
        Don't have an account? <a href="signup.html" style="color:#1a7a7a; font-weight:600;">Create account</a>
      </p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js" type="module"></script>
  <script src="js/utils.js" type="module"></script>
  <script src="js/data.js" type="module"></script>
  <script src="js/auth.js" type="module"></script>
  <script src="js/main.js" type="module"></script>
  <script type="module">
    import { signIn } from './js/data.js';
    import { showToast } from './js/utils.js';

    // Role button click handlers
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        // Remove selected class from all buttons
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
        // Add selected class to clicked button
        btn.classList.add('selected');
        // Fill in credentials
        document.getElementById('emailInput').value = btn.dataset.email;
        document.getElementById('passwordInput').value = btn.dataset.pass;
      });
    });

    // Select first role by default
    document.querySelector('.role-btn').classList.add('selected');
    document.getElementById('emailInput').value = document.querySelector('.role-btn').dataset.email;
    document.getElementById('passwordInput').value = document.querySelector('.role-btn').dataset.pass;

    // Login button handler
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const errorEl = document.getElementById('loginError');

      try {
        const user = await signIn(email, password);
        
        // Redirect based on role
        const redirects = {
          'student': 'student-dashboard.html',
          'scheduler': 'scheduler-dashboard.html',
          'ci': 'ci-dashboard.html',
          'admin': 'admin.html'
        };
        
        window.location.href = redirects[user.role] || 'student-dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message || 'Login failed. Please try again.';
        errorEl.style.display = 'block';
        showToast('Login failed: ' + err.message, 'error');
      }
    });

    // Allow Enter key to submit
    document.getElementById('passwordInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('loginBtn').click();
      }
    });
  </script>
</body>
</html>
